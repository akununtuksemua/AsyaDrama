<!DOCTYPE html>
<html>
<head></head>
<body style="margin:0;background:black;">

<video id="video" controls autoplay style="width:100%;height:100vh;"></video>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
const vid = new URLSearchParams(location.search).get("vid");

async function load() {
  let res = await fetch(`https://melolo-api-azure.vercel.app/api/melolo/stream/${vid}`);
  let json = await res.json();

  console.log(json); // DEBUG

  let url = json.data.url || json.url;

  let video = document.getElementById("video");

  if (!url) {
    alert("Video tidak ditemukan!");
    return;
  }

  if (Hls.isSupported()) {
    let hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  } else {
    video.src = url;
  }
}

load();
</script>

</body>
</html>
