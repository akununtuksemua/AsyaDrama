<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<video id="video" controls autoplay style="width:100%; height:100vh;"></video>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
const vid = new URLSearchParams(location.search).get("vid");

async function load() {
  let res = await fetch(`https://melolo-api-azure.vercel.app/api/melolo/stream/${vid}`);
  let json = await res.json();

  let url = json.data.url;
  let video = document.getElementById("video");

  if (Hls.isSupported()) {
    let hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  } else {
    video.src = url;
  }

  // AUTO NEXT (basic)
  video.onended = () => alert("Next Episode Coming Soon ??");
}

load();
</script>

</body>
</html>
