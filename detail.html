<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2 id="title"></h2>
  <div id="episodes"></div>
</div>

<script>
const id = new URLSearchParams(location.search).get("id");

async function load() {
  let res = await fetch(`https://melolo-api-azure.vercel.app/api/melolo/detail/${id}`);
  let json = await res.json();

  console.log(json); // DEBUG

  let data = json.data;

  document.getElementById("title").innerText = data.title;

  let html = "";

  let eps = data.episodes || data.chapter_list || [];

  eps.forEach(ep => {
    let vid = ep.vid_id || ep.video_id;
    let num = ep.episode || ep.number || "?";

    html += `
      <button onclick="play('${vid}')">
        Episode ${num}
      </button>
    `;
  });

  document.getElementById("episodes").innerHTML = html;
}

function play(v) {
  window.location.href = "player.html?vid=" + v;
}

load();
</script>

</body>
</html>
