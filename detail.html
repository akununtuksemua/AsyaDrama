<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2 id="title"></h2>
  <div id="episodes"></div>
</div>

<script>
const id = new URLSearchParams(location.search).get("id");

async function load() {
  let res = await fetch(`https://melolo-api-azure.vercel.app/api/melolo/detail/${id}`);
  let json = await res.json();

  document.getElementById("title").innerText = json.data.title;

  let html = "";
  json.data.episodes.forEach(ep => {
    html += `<button onclick="play('${ep.vid_id}')">Episode ${ep.episode}</button>`;
  });

  document.getElementById("episodes").innerHTML = html;
}

function play(v) {
  location.href = "player.html?vid=" + v;
}

load();
</script>

</body>
</html>
